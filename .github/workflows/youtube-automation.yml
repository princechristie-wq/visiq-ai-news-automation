name: Visiq AI Automation

on:
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python main.py

      - name: Upload Files
        uses: actions/upload-artifact@v4
        with:
          name: visiq-ai-output
          path: |
              topic.txt
              script.txt
              title.txt
              description.txt
              hashtags.txt
              voice.mp3
